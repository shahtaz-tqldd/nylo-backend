services:
  django-wsgi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      DJANGO_RUN_MIGRATIONS: "1"
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ..:/app
    ports:
      - "${WSGI_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nylo-dev

  django-asgi:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: uvicorn app.asgi:application --host 0.0.0.0 --port 8001 --reload
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ..:/app
    ports:
      - "${ASGI_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nylo-dev

  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app worker -l info
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nylo-dev

  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app beat -l info
    env_file:
      - ../.env
    environment:
      APP_ENV: dev
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    volumes:
      - ..:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nylo-dev

  postgres:
    image: postgres:16-alpine
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_NAME:-nylo_db}
      POSTGRES_USER: ${DB_USER:-nylo_db_owner}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nylo_db_password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_FORWARD_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nylo_db_owner} -d ${DB_NAME:-nylo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      nylo-dev:
        aliases:
          - postgres

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_FORWARD_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      nylo-dev:
        aliases:
          - redis

volumes:
  postgres_dev_data:

networks:
  nylo-dev:
    driver: bridge
